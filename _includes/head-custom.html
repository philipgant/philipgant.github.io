<style>
  /* Side-by-side photo pair with per-image captions */
  .feature-pair {
    display: flex;
    gap: 16px;
    margin: 1rem 0 1.5rem;
  }
  .feature-pair figure {
    flex: 1;
    margin: 0;
  }
  .feature-pair img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
  }
  .feature-pair figcaption {
    font-style: italic;
    font-size: 0.9em;
    color: #555;
    margin-top: 8px;
    line-height: 1.4;
  }
  /* Single-image feature */
  .feature-single img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
  }
  .feature-single figcaption {
    font-style: italic;
    font-size: 0.9em;
    color: #555;
    margin-top: 8px;
  }
  /* Constrain all images on feature pages */
  article img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
  }
  /* Thumbnail archive grid */
  .archive-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 1rem 0;
  }
  .archive-grid a {
    display: block;
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    border-radius: 4px;
  }
  .archive-grid img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.2s;
  }
  .archive-grid a:hover img {
    opacity: 0.85;
  }
  .archive-grid .thumb-date {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 6px 8px;
    font-size: 0.75em;
    color: rgba(255, 255, 255, 0.85);
    background: linear-gradient(transparent, rgba(0, 0, 0, 0.35));
    text-align: right;
    text-decoration: none;
  }
  /* Shared caption beneath a photo pair */
  .feature-caption {
    font-style: italic;
    font-size: 0.9em;
    color: #555;
    line-height: 1.5;
    margin-top: -0.5rem;
    margin-bottom: 1.5rem;
  }

  /* Dark mode */
  [data-theme="dark"] body,
  [data-theme="dark"] .wrapper {
    background: #1a1a1a;
    color: #e8e6e3;
  }
  [data-theme="dark"] h1,
  [data-theme="dark"] h2,
  [data-theme="dark"] h3,
  [data-theme="dark"] h4,
  [data-theme="dark"] h5,
  [data-theme="dark"] h6,
  [data-theme="dark"] strong {
    color: #f0f0f0;
  }
  [data-theme="dark"] a,
  [data-theme="dark"] a:visited {
    color: #8ab4f8;
  }
  [data-theme="dark"] a:hover {
    color: #a5c9ff;
  }
  [data-theme="dark"] header h1 a,
  [data-theme="dark"] header h1 a:visited {
    color: #f0f0f0;
  }
  [data-theme="dark"] hr,
  [data-theme="dark"] th,
  [data-theme="dark"] td {
    border-color: #3a3a3a;
  }
  [data-theme="dark"] code,
  [data-theme="dark"] tt,
  [data-theme="dark"] pre {
    background: #2a2a2a;
    border-color: #3a3a3a;
    color: #e8e6e3;
  }
  [data-theme="dark"] blockquote {
    border-left-color: #3a3a3a;
    color: #a0a0a0;
  }
  [data-theme="dark"] .feature-pair figcaption,
  [data-theme="dark"] .feature-single figcaption,
  [data-theme="dark"] .feature-caption {
    color: #a0a0a0;
  }

  /* Theme toggle pill switch */
  .theme-toggle {
    position: relative;
    display: inline-block;
    width: 56px;
    height: 26px;
    padding: 0;
    margin-top: 1rem;
    background: rgba(128, 128, 128, 0.15);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.15s, background 0.2s;
    vertical-align: middle;
  }
  .theme-toggle:hover {
    opacity: 1;
  }
  [data-theme="dark"] .theme-toggle {
    background: rgba(255, 255, 255, 0.12);
  }
  .theme-toggle-thumb {
    position: absolute;
    top: 50%;
    left: 3px;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.35;
    pointer-events: none;
    transition: left 0.2s ease;
  }
  [data-theme="dark"] .theme-toggle-thumb {
    left: calc(100% - 21px);
  }

  /* Stack to 2 columns on narrow screens */
  @media (max-width: 600px) {
    .feature-pair {
      flex-direction: column;
    }
    .archive-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>

<script>
  (function() {
    var stored = localStorage.getItem('theme');
    var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = stored || (systemDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  })();

  document.addEventListener('DOMContentLoaded', function() {
    var toggle = document.querySelector('.theme-toggle');
    if (!toggle) return;
    toggle.addEventListener('click', function() {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      var newTheme = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  });
</script>
