<div class="feature-pair">
  <figure>
    <img src="{{ include.img1 | relative_url }}" alt="{{ include.cap1 }}">
    {% if include.cap1 %}<figcaption>{{ include.cap1 }}</figcaption>{% endif %}
  </figure>
  <figure>
    <img src="{{ include.img2 | relative_url }}" alt="{{ include.cap2 }}">
    {% if include.cap2 %}<figcaption>{{ include.cap2 }}</figcaption>{% endif %}
  </figure>
</div>
{% if include.caption %}
<p class="feature-caption">{{ include.caption }}</p>
{% endif %}
